<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grile Admitere Master</title>
<style>
  :root {
    --bg: #f4f6fa;
    --card: #ffffff;
    --text: #0b2f63;
    --muted: #5a6c85;
    --border: #dfe4ec;
    --accent: #0b2f63;
    --good: #1a9a55;
    --good-bg: #e6f7ee;
    --bad: #ff0000;
    --bad-bg: #ffeaea;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0a1420;
      --card: #122238;
      --text: #e8ecf5;
      --muted: #9aa9bd;
      --border: #24384f;
      --accent: #5b8dd4;
      --good: #35c274;
      --good-bg: #17352605;
      --bad: #ff4d4d;
      --bad-bg: #3f1717;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0a1420;
    --card: #122238;
    --text: #e8ecf5;
    --muted: #9aa9bd;
    --border: #24384f;
    --accent: #5b8dd4;
    --good: #35c274;
    --good-bg: #17352605;
    --bad: #ff4d4d;
    --bad-bg: #3f1717;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  header h1 { font-size: 17px; margin: 0 8px 0 0; }
  .lang-switch {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .lang-switch button {
    font-size: 15px;
    font-family: inherit;
    padding: 7px 16px;
    border: none;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
  }
  .lang-switch button + button { border-left: 1px solid var(--border); }
  .lang-switch button.activ {
    background: var(--accent);
    color: #fff;
    cursor: default;
  }
  #score {
    margin-left: auto;
    font-size: 14px;
    color: var(--muted);
    white-space: nowrap;
  }
  #score b.good { color: var(--good); }
  #score b.bad { color: var(--bad); }
  button#reset, button#theme, button#test {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
  }
  button#reset:hover, button#theme:hover, button#test:hover { border-color: var(--accent); color: var(--accent); }
  button#test.activ {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  main { max-width: 860px; margin: 0 auto; padding: 20px 16px 80px; }
  .sectiune-titlu {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 28px 4px 10px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .intrebare { font-weight: 600; margin-bottom: 12px; }
  .intrebare .nr { color: var(--accent); margin-right: 6px; }
  .subvar { margin: 8px 0 0 2px; }
  .subvar-item { display: flex; gap: 8px; margin-top: 4px; font-weight: 500; }
  .subvar-item .sv-lit { flex: 0 0 auto; color: var(--accent); font-weight: 700; }
  .opt {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    width: 100%;
    text-align: left;
    font-size: 15px;
    font-family: inherit;
    color: inherit;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); }
  .opt:disabled { cursor: default; opacity: 0.85; }
  .opt .lit {
    font-weight: 700;
    flex: 0 0 auto;
    width: 22px;
    color: var(--muted);
  }
  .card.done .opt.corect {
    background: var(--good-bg);
    border-color: var(--good);
    opacity: 1;
  }
  .card.done .opt.corect .lit { color: var(--good); }
  .card.done .opt.gresit {
    background: var(--bad-bg);
    border-color: var(--bad);
    opacity: 1;
  }
  .card.done .opt.gresit .lit { color: var(--bad); }
  .verdict { font-size: 14px; font-weight: 600; margin-top: 6px; }
  .verdict.good { color: var(--good); }
  .verdict.bad { color: var(--bad); }
  footer {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 16px 30px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }
  footer b { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1 id="titlu">Grile Admitere Master</h1>
  <div class="lang-switch">
    <button id="btn-ro">Română</button>
    <button id="btn-en">English</button>
  </div>
  <button id="test">Test (20)</button>
  <button id="reset">Reset</button>
  <button id="theme" title="Dark / Light">🌙</button>
  <span id="score"></span>
</header>
<main id="lista"></main>
<footer id="vizite" hidden></footer>
<script>
const DATA = {"ro": [{"numar": 1, "materie": "Microeconomie", "intrebare": "Presupunem că oferta pentru produsul A este perfect elastică. Dacă cererea pentru acest produs creşte:", "raspunsuri": {"A": "preţul şi cantitatea de echilibru vor creşte;", "B": "preţul şi cantitatea de echilibru vor scădea;", "C": "cantitatea de echilibru va creşte dar preţul nu se va modifica;", "D": "preţul de echilibru va creşte dar cantitatea nu se va modifica."}, "raspuns_corect": "C"}, {"numar": 2, "materie": "Microeconomie", "intrebare": "În condiţiile în care coeficientul elasticităţii cererii în funcţie de venit este mai mare decât 1 şi venitul creşte, ponderea cheltuielilor pentru marfa X în cheltuielile totale:", "raspunsuri": {"A": "va creşte;", "B": "se va reduce;", "C": "rămâne constantă;", "D": "nu se poate determina."}, "raspuns_corect": "A"}, {"numar": 3, "materie": "Microeconomie", "intrebare": "În situaţia în care cererea pentru produsele agricole este inelastică:", "raspunsuri": {"A": "reducerea preţurilor determină o creştere a veniturilor încasate de producători;", "B": "reducerea preţurilor determină o reducere a veniturilor producătorilor;", "C": "creşterea preţurilor nu conduce la diferenţieri în veniturile producătorilor;", "D": "procentul de reducere a preţurilor este mai mic decat cel de creştere a cererii."}, "raspuns_corect": "B"}, {"numar": 4, "materie": "Microeconomie", "intrebare": "Pentru un consumator rațional care are de ales între două bunuri în condițiile constrângerii bugetare, modificarea prețului unuia dintre bunuri, caeteris paribus, va determina:", "raspunsuri": {"A": "deplasarea paralelă a liniei bugetului", "B": "modificarea pantei liniei bugetului", "C": "nu va modifica linia bugetului", "D": "deplasarea paralelă a liniei bugetului la dreapta."}, "raspuns_corect": "B"}, {"numar": 5, "materie": "Microeconomie", "intrebare": "Preţul produsului A s-a redus de la 100 la 90 lei şi, ca urmare, cantitatea cerută a crescut de la 70 la 75 unităţi. Cererea este:", "raspunsuri": {"A": "inelastică;", "B": "elastică;", "C": "cu elasticitate unitară;", "D": "nu poate fi determinată din informaţia dată."}, "raspuns_corect": "A"}, {"numar": 6, "materie": "Microeconomie", "intrebare": "Alegeţi afirmaţia falsă :", "raspunsuri": {"A": "În general, cererea pentru bunurile de strictă necesitate este mai puţin elastică decât cererea pentru bunurile de lux.", "B": "Dacă preţul şi venitul producătorilor sunt direct proporţionale, cererea este elastică.", "C": "O perioadă lungă de timp de la modificarea preţului bunului A imprimă ofertei un caracter elastic.", "D": "Pentru o firmă al cărei proces de producție presupune realizarea a două bunuri, unul principal și altul secundar, dacă preţul pentru bunul principal creşte, - caeteris paribus - oferta de pe piaţa bunului secundar va spori (şi invers)."}, "raspuns_corect": "B"}, {"numar": 7, "materie": "Microeconomie", "intrebare": "În cazul în care curba cererii pentru produsul A se deplasează la dreapta, iar preţul pentru produsul B scade, se poate concluziona că:", "raspunsuri": {"A": "A şi B sunt substituibile;", "B": "A şi B sunt bunuri complementare;", "C": "A este un bun inferior, iar B este un bun superior;", "D": "Ambele bunuri A şi B sunt inferioare."}, "raspuns_corect": "B"}, {"numar": 8, "materie": "Microeconomie", "intrebare": "Presupunem că preţul unui bun scade cu 10%, iar cantitatea cerută pentru o anumită perioadă de timp creşte cu 15%. În aceste condiţii:", "raspunsuri": {"A": "veniturile încasate scad;", "B": "veniturile încasate de producători cresc;", "C": "veniturile nu sunt influenţate în nici un fel;", "D": "cheltuielile firmei cresc."}, "raspuns_corect": "B"}, {"numar": 9, "materie": "Microeconomie", "intrebare": "Dacă o creştere a preţului cu 50% antrenează o creştere a cantităţii oferite dintr-un bun economic de la 10 la 20 bucăţi. Să se calculeze coeficientul de elasticitate al ofertei.", "raspunsuri": {"A": "¼.", "B": "½;", "C": "1;", "D": "2."}, "raspuns_corect": "D"}, {"numar": 10, "materie": "Microeconomie", "intrebare": "Utilitatea totală coincide cu cea marginală:", "raspunsuri": {"A": "pentru prima unitate consumată;", "B": "numai în cazul consumatorului iraţional;", "C": "la nivelul ultimei unităţi consumate;", "D": "la nivelul pragului de saturaţie."}, "raspuns_corect": "A"}, {"numar": 11, "materie": "Microeconomie", "intrebare": "Curba de indiferenţă semnifică:", "raspunsuri": {"A": "consum egal a două bunuri;", "B": "utilitate egală din consumul a două combinaţii de bunuri;", "C": "venit egal al consumatorului;", "D": "preţuri egale ale bunurilor consumate."}, "raspuns_corect": "B"}, {"numar": 12, "materie": "Microeconomie", "intrebare": "Punctele la intersecţia liniei bugetului cu axele coordonatelor semnifică:", "raspunsuri": {"A": "Consumatorul nu-şi cheltuieşte tot venitul", "B": "Consumatorul îşi cheltuieşte tot venitul doar pentru un bun", "C": "Consumatorul nu cheltuieşte absolut nimic", "D": "Sunt puncte imposibil de atins de către consumator."}, "raspuns_corect": "B"}, {"numar": 13, "materie": "Microeconomie", "intrebare": "Un agent economic contractează un împrumut de 15000 lei pe care îl va rambursa în trei tranşe anuale egale. Care va fi dobânda totală plătită, ştiind că rata anuală a dobânzii este de 12% pe an?", "raspunsuri": {"A": "3.600 lei", "B": "1.800 lei", "C": "5.400 lei", "D": "1.500 lei"}, "raspuns_corect": "A"}, {"numar": 14, "materie": "Microeconomie", "intrebare": "Un agent economic depune la o bancă o sumă de 10.000 lei cu o rată a dobânzii de 5 %. Care va fi suma existentă în bancă după 2 ani dacă agentul economic nu execută retrageri din contul creat în această perioadă?", "raspunsuri": {"A": "11.000 lei", "B": "1.000 lei", "C": "11.025 lei", "D": "500 lei"}, "raspuns_corect": "C"}, {"numar": 15, "materie": "Microeconomie", "intrebare": "Care dintre următoarele afirmaţii sunt false?", "raspunsuri": {"A": "Informaţia, abilitatea întreprinzătorului, progresul tehnic sunt neofactori de producţie.", "B": "Corespunzător stadiilor fluxului circular al capitalului firmei, acesta îmbracă trei forme: bani, bunuri-capital şi respectiv marfă.", "C": "Deprecierea capitalului fix se datorează numai uzurii fizice.", "D": "Factorii de producţie reprezintă resurse atrase şi folosite în activitatea economică."}, "raspuns_corect": "C"}, {"numar": 16, "materie": "Microeconomie", "intrebare": "Care din următoarele aspecte delimitează capitalul fix de cel circulant: a. numărul de cicluri de producţie la care participă; b. locul de desfăşurare a activităţii de producţie; c. perioada după care se înlocuiesc; d. modalitatea de transmitere a valorii sale asupra noului produs.", "raspunsuri": {"A": "(a, d)", "B": "(c, d)", "C": "(a, c, d)", "D": "(b, c, d)"}, "raspuns_corect": "C"}, {"numar": 17, "materie": "Microeconomie", "intrebare": "La o societate comercială se dau următoarele date: costuri materiale 89 mil.; capital circulant 45 mil.; salarii indirecte 10 mil.; costuri fixe 90 mil.; costuri variabile 52 mil. Să se calculeze costurile materiale fixe şi amortizarea:", "raspunsuri": {"A": "60 şi 64;", "B": "70 şi 56;", "C": "80 şi 44;", "D": "89 şi 45."}, "raspuns_corect": "C"}, {"numar": 18, "materie": "Microeconomie", "intrebare": "În componenţa costului fix se includ: a. cheltuielile cu salariile personalului administrativ; b. cheltuielile cu amortizarea capitalului fix; c. costurile cu energia pentru fabricaţie; d. cheltuielile cu iluminatul general.", "raspunsuri": {"A": "(a, b, c)", "B": "(a, b, d)", "C": "(a, c, d)", "D": "(b, c, d)"}, "raspuns_corect": "B"}, {"numar": 19, "materie": "Microeconomie", "intrebare": "Când volumul producţiei este zero: a. costul fix este 0; b. costul variabil este 0; c. costul fix este mai mare decât costul variabil; d. costul variabil este mai mare decât costul fix.", "raspunsuri": {"A": "(a, b, c)", "B": "(b, c, d)", "C": "(b, c)", "D": "(a, d)"}, "raspuns_corect": "C"}, {"numar": 20, "materie": "Microeconomie", "intrebare": "Să se calculeze CFM, pentru un nivel al producţiei Q = 20, ştiind că funcţia costului total este: CT = 200 + 3Q + 2Q2.", "raspunsuri": {"A": "1060", "B": "200", "C": "20", "D": "10"}, "raspuns_corect": "D"}, {"numar": 21, "materie": "Microeconomie", "intrebare": "Care dintre următoarele afirmaţii este falsă:", "raspunsuri": {"A": "Concurenţa perfectă presupune mulţi vânzători de produse standardizate;", "B": "Concurenţa monopolistică presupune mulţi vânzători de produse omogene;", "C": "Oligopolul presupune câţiva producători de bunuri standardizate sau diferenţiate;", "D": "Monopolul presupune un singur produs pentru care nu există substitute apropiate."}, "raspuns_corect": "B"}, {"numar": 22, "materie": "Microeconomie", "intrebare": "Pe piaţa cu concurenţă perfectă:", "raspunsuri": {"A": "Firma este un „price – taker”, adică preia preţul stabilit pe piaţă;", "B": "Firma este un „price – maker”, adică stabileşte preţul pe piaţă;", "C": "Produsele firmelor sunt diferenţiate;", "D": "Barierele de intrare sunt minime, iar cele de ieşire de pe piaţă sunt maxime."}, "raspuns_corect": "A"}, {"numar": 23, "materie": "Microeconomie", "intrebare": "Care dintre condiţiile următoare indică faptul că un bun este produs în condiţii de concurenţă perfectă:", "raspunsuri": {"A": "profiturile producătorilor sunt mari;", "B": "profiturile producătorilor sunt mici;", "C": "oferta totală este inelastică;", "D": "cererea individuală este perfect elastică."}, "raspuns_corect": "D"}, {"numar": 24, "materie": "Microeconomie", "intrebare": "Condiţia de maximizare a profitului în cazul unei firme pe o piaţă cu concurenţă monopolistică este următoarea (Vmg este venitul marginal, Cmg costul marginal, P este preţul, CTM costul mediu, VT veniturile totale):", "raspunsuri": {"A": "Vmg = Cmg", "B": "Cmg = P", "C": "Vmg = CTM", "D": "VT să fie maxim."}, "raspuns_corect": "A"}, {"numar": 25, "materie": "Microeconomie", "intrebare": "Care dintre următoarele afirmaţii cu privire la monopol sunt adevărate:", "raspunsuri": {"A": "Există mai multe firme producătoare a unui produs specific;", "B": "Există o singură firmă producătoare, dar produsul are substitute apropiate;", "C": "Nu există competitori pe piaţa relevantă;", "D": "Barierele de intrare sunt reduse."}, "raspuns_corect": "C"}, {"numar": 26, "materie": "Microeconomie", "intrebare": "Între concurenţa monopolistică şi cea perfectă există diferenţe privind:", "raspunsuri": {"A": "intrarea pe piaţă;", "B": "numărul de vânzători şi cumpărători;", "C": "puterea de piaţă a competitorilor;", "D": "omogenitatea produselor."}, "raspuns_corect": "D"}, {"numar": 27, "materie": "Microeconomie", "intrebare": "Care dintre următoarele pot fi considerate trăsăturile de bază ale bunurilor publice:", "raspunsuri": {"A": "se află în proprietatea statului;", "B": "se caracterizează prin non – excluziune şi non - rivalitate;", "C": "se caracterizează prin rivalitate şi excluziune;", "D": "pot fi pozitive sau negative."}, "raspuns_corect": "B"}, {"numar": 28, "materie": "Microeconomie", "intrebare": "Care dintre următoarele soluţii nu fac parte dintre căile de internalizare a externalităţilor:", "raspunsuri": {"A": "practicarea unor amenzi plătite de producătorul de externalităţi negative;", "B": "introducerea de taxe şi impozite care să aducă costurile private la nivelul celor sociale;", "C": "închiderea firmelor producătoare de externalităţi pozitive sau negative;", "D": "unirea producătorului de externalitate negativă cu receptorul unui asemenea efect."}, "raspuns_corect": "C"}, {"numar": 29, "materie": "Microeconomie", "intrebare": "În mod normal, economia naturală se caracterizează prin:", "raspunsuri": {"A": "formarea preţurilor prin mecanisme complexe;", "B": "concurenţa perfectă;", "C": "preponderenţa schimbului de produse;", "D": "satisfacerea nevoilor comunităţii şi individului din producţie proprie."}, "raspuns_corect": "D"}, {"numar": 30, "materie": "Microeconomie", "intrebare": "Care dintre trăsăturile de mai jos definesc trebuințele umane:", "raspunsuri": {"A": "nu sunt concurente;", "B": "nu se sting momentan prin satisfacere;", "C": "sunt nelimitate în capacitate;", "D": "sunt nelimitate ca număr."}, "raspuns_corect": "D"}, {"numar": 31, "materie": "Contabilitate", "intrebare": "Capitalul propriu al entităţii economice reprezintă:", "raspunsuri": {"A": "principala sursă proprie de finanţare a elementelor de avere din activul patrimonial;", "B": "expresia bănească a valorilor economice investite de către proprietari;", "C": "interesul rezidual al proprietarilor în activele unei întreprinderi, după deducerea tuturor datoriilor;", "D": "echivalentul valoric al acelei părţi din elementele de activ asupra cărora titularii de patrimoniu îşi exercită dreptul deplin de proprietate."}, "raspuns_corect": "C"}, {"numar": 32, "materie": "Contabilitate", "intrebare": "Activele entităţii economice sunt definite ca:", "raspunsuri": {"A": "resurse controlate de către entitate, ca rezultat al unor evenimente prezente, de la care se aşteaptă să genereze beneficii economice viitoare pentru entitate şi al cărui cost poate fi evaluat în mod credibil;", "B": "resurse controlate de către entitate ca rezultat al unor evenimente trecute, de la care se aşteaptă să genereze beneficii economice viitoare pentru entitate şi al cărui cost poate fi evaluat în mod credibil;", "C": "resurse controlate de către entitate ca rezultat al unor evenimente trecute, de la care se aşteaptă să genereze beneficii economice prezente pentru entitate şi al cărui cost poate fi evaluat în mod credibil;", "D": "resurse controlate de către entitate, ca rezultat al unor evenimente prezente, de la care se aşteaptă să genereze beneficii economice viitoare pentru entitate şi al cărui cost nu poate fi evaluat în mod credibil."}, "raspuns_corect": "B"}, {"numar": 33, "materie": "Contabilitate", "intrebare": "Rezultatul contabil (brut) al exerciţiului financiar se determină potrivit relației:", "raspunsuri": {"A": "rezultat din exploatare + rezultat curent;", "B": "rezultat financiar + rezultat curent;", "C": "rezultat din exploatare + rezultat financiar;", "D": "rezultat net + cheltuieli nedeductibile fiscal – venituri neimpozabile."}, "raspuns_corect": "C"}, {"numar": 34, "materie": "Contabilitate", "intrebare": "Costul de producţie al unei imobilizări corporale realizate în cadrul entităţii economice, cuprinde:", "raspunsuri": {"A": "costurile directe de producţie, cheltuielile indirecte de producţie angajate, cheltuielile generale de administraţie;", "B": "costul de achiziţie al materiilor prime şi materialelor directe consumate, celelalte cheltuieli directe de producţie, cota cheltuielilor indirecte alocată raţional ca fiind legate de fabricaţia bunului respectiv;", "C": "costurile directe de producţie, costurile indirecte de producţie, costurile de distribuţie;", "D": "costurile directe de producţie, costurile indirecte de producţie angajate, costurile cu dobânzile."}, "raspuns_corect": "B"}, {"numar": 35, "materie": "Contabilitate", "intrebare": "Preţul de vânzare cu amănuntul al mărfurilor (PAM) se determină astfel :", "raspunsuri": {"A": "PAM = cost de achiziţie + adaos comercial + TVA neexigibilă;", "B": "PAM = preţ cumpărare + comision + TVA neexigibilă;", "C": "PAM= preţ cu ridicata + adaos comercial+TVA colectată;", "D": "nici un răspuns nu este corect."}, "raspuns_corect": "A"}, {"numar": 36, "materie": "Contabilitate", "intrebare": "Contabilizarea stocurilor conform metodei inventarului permanent, presupune:", "raspunsuri": {"A": "contabilizarea variaţiei stocurilor la finele perioadei de gestiune;", "B": "necontabilizarea ieşirilor de stocuri în cursul perioadei;", "C": "contabilizarea achiziţiilor de stocuri drept cheltuieli cu stocurile;", "D": "contabilizarea tuturor operaţiilor de intrare şi de ieşire de stocuri, utilizând conturile de stocuri."}, "raspuns_corect": "D"}, {"numar": 37, "materie": "Contabilitate", "intrebare": "Veniturile constatate sunt cele la care puns_corect": "B"}, {"numar": 66, "materie": "Management", "intrebare": "The number of employees a manager can efficiently and effectively manage represents:", "raspunsuri": {"A": "span of control;", "B": "position;", "C": "department;", "D": "organizational level."}, "raspuns_corect": "A"}, {"numar": 67, "materie": "Management", "intrebare": "The trajectory an information or a category of information follows between the sender and the receiver defines:", "raspunsuri": {"A": "informational procedure;", "B": "informational flux;", "C": "information circuit;", "D": "means of information handling."}, "raspuns_corect": "C"}, {"numar": 68, "materie": "Management", "intrebare": "The method used in management that consists in identifying the strengths and the weaknesses of the analysed area together with their respective causes, and that is finalized by making corrective or developmental suggestions – is named as:", "raspunsuri": {"A": "diagnosis;", "B": "brainstorming;", "C": "Delphi;", "D": "Dashboard"}, "raspuns_corect": "A"}, {"numar": 69, "materie": "Management", "intrebare": "The entrepreneurial-managerial method of designing and promoting a new business or of significantly developing an existing one, method that starts with identifying an economic opportunity and by which one determines the objectives that are to be accomplished, sizes and structures the main resources and activities, aiming to prove that it can be profitable and it is worth to be supported by the potential stakeholders – is:", "raspunsuri": {"A": "dashboard;", "B": "business plan;", "C": "discovery matrix;", "D": "project-based management."}, "raspuns_corect": "B"}, {"numar": 70, "materie": "Management", "intrebare": "The major deficiencies in the communication process (the most significant barriers to communication) can be: a. of language,expression; b. receiving; c. contextual; d. mixed.", "raspunsuri": {"A": "a, b, c, d;", "B": "a, b, c;", "C": "b, c, d;", "D": "a, b, d."}, "raspuns_corect": "A" const UI = {
  ro: { corect: '✔ Corect!', gresit: c => `✘ Greșit — răspunsul corect este ${c}.`,
        scor: (ok, wrong, done, total) => `<b class="good">${ok} corecte</b> · <b class="bad">${wrong} greșite</b> · ${done}/${total}`,
        reset: 'Reset', test: 'Test (20)' },
  en: { corect: '✔ Correct!', gresit: c => `✘ Wrong — the correct answer is ${c}.`,
        scor: (ok, wrong, done, total) => `<b class="good">${ok} correct</b> · <b class="bad">${wrong} wrong</b> · ${done}/${total}`,
        reset: 'Reset', test: 'Test (20)' }
};

const lista = document.getElementById('lista');
const scoreEl = document.getElementById('score');
const btns = { ro: document.getElementById('btn-ro'), en: document.getElementById('btn-en') };
const testBtn = document.getElementById('test');
const NR_TEST = 20;
let lang = 'ro';
let testMode = false;
let testIdx = [];
let stats = { ok: 0, wrong: 0, total: 0 };

function genTest() {
  const n = DATA[lang].length;
  testIdx = shuffleArray([...Array(n).keys()]).slice(0, NR_TEST);
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// desparte enunturile cu subvariante inline (a. b. c. ...) in stem + lista
function splitSubvariante(text) {
  const re = /(^|\s)([a-z])\.\s/g;
  let m, markers = [];
  let expected = 'a';
  while ((m = re.exec(text)) !== null) {
    if (m[2] === expected) {
      markers.push({ letter: m[2], start: m.index + m[1].length, textStart: re.lastIndex });
      expected = String.fromCharCode(expected.charCodeAt(0) + 1);
    }
  }
  if (markers.length < 2) return null;
  const stem = text.slice(0, markers[0].start).trim();
  const items = markers.map((mk, i) => {
    const end = i + 1 < markers.length ? markers[i + 1].start : text.length;
    return { letter: mk.letter, text: text.slice(mk.textStart, end).trim() };
  });
  return { stem, items };
}

function updateScore() {
  const done = stats.ok + stats.wrong;
  scoreEl.innerHTML = UI[lang].scor(stats.ok, stats.wrong, done, stats.total);
}

function render() {
  btns.ro.classList.toggle('activ', lang === 'ro');
  btns.en.classList.toggle('activ', lang === 'en');
  testBtn.classList.toggle('activ', testMode);
  testBtn.textContent = UI[lang].test;
  document.documentElement.lang = lang;
  const faraNumere = testMode;
  const intrebari = testMode ? testIdx.map(i => DATA[lang][i]) : DATA[lang];
  lista.innerHTML = '';
  stats = { ok: 0, wrong: 0, total: intrebari.length };
  updateScore();

  let sectCurenta = null;
  intrebari.forEach(q => {
    if (!faraNumere && q.materie && q.materie !== sectCurenta) {
      sectCurenta = q.materie;
      const h = document.createElement('div');
      h.className = 'sectiune-titlu';
      h.textContent = sectCurenta;
      lista.appendChild(h);
    }

    const card = document.createElement('div');
    card.className = 'card';

    const qEl = document.createElement('div');
    qEl.className = 'intrebare';
    if (!faraNumere) qEl.innerHTML = `<span class="nr">${q.numar}.</span>`;
    const sv = splitSubvariante(q.intrebare);
    qEl.appendChild(document.createTextNode(sv ? sv.stem : q.intrebare));
    if (sv) {
      const box = document.createElement('div');
      box.className = 'subvar';
      sv.items.forEach(it => {
        const row = document.createElement('div');
        row.className = 'subvar-item';
        const lit = document.createElement('span');
        lit.className = 'sv-lit';
        lit.textContent = it.letter + '.';
        row.appendChild(lit);
        row.appendChild(document.createTextNode(it.text));
        box.appendChild(row);
      });
      qEl.appendChild(box);
    }
    card.appendChild(qEl);

    const optBtns = {};
    ['A', 'B', 'C', 'D'].forEach(lit => {
      const b = document.createElement('button');
      b.className = 'opt';
      const litEl = document.createElement('span');
      litEl.className = 'lit';
      litEl.textContent = lit + '.';
      b.appendChild(litEl);
      b.appendChild(document.createTextNode(q.raspunsuri[lit]));
      b.addEventListener('click', () => alege(lit));
      optBtns[lit] = b;
      card.appendChild(b);
    });

    const verdict = document.createElement('div');
    verdict.className = 'verdict';
    card.appendChild(verdict);

    function alege(lit) {
      if (card.classList.contains('done')) return;
      card.classList.add('done');
      Object.values(optBtns).forEach(b => b.disabled = true);
      optBtns[q.raspuns_corect].classList.add('corect');
      if (lit === q.raspuns_corect) {
        stats.ok++;
        verdict.textContent = UI[lang].corect;
        verdict.classList.add('good');
      } else {
        stats.wrong++;
        optBtns[lit].classList.add('gresit');
        verdict.textContent = UI[lang].gresit(q.raspuns_corect);
        verdict.classList.add('bad');
      }
      updateScore();
    }

    lista.appendChild(card);
  });
}

const themeBtn = document.getElementById('theme');
function currentTheme() {
  const saved = localStorage.getItem('tema');
  if (saved) return saved;
  return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
}
applyTheme(currentTheme());
themeBtn.addEventListener('click', () => {
  const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('tema', t);
  applyTheme(t);
});

btns.ro.addEventListener('click', () => { if (lang !== 'ro') { lang = 'ro'; render(); } });
btns.en.addEventListener('click', () => { if (lang !== 'en') { lang = 'en'; render(); } });
testBtn.addEventListener('click', () => { testMode = !testMode; if (testMode) genTest(); render(); });
document.getElementById('reset').addEventListener('click', () => { if (testMode) genTest(); render(); });
render();

(function contorVizite() {
  const el = document.getElementById('vizite');
  const APIBASE = 'https://api.counterapi.dev/v1/grile-admitere-master-ulbs/quiz-master';
  // numara o singura data pe sesiune; la revenire doar citeste
  const url = sessionStorage.getItem('vizitat') ? APIBASE + '/' : APIBASE + '/up';
  fetch(url)
    .then(r => { if (!r.ok) throw 0; return r.json(); })
    .then(d => {
      sessionStorage.setItem('vizitat', '1');
      const n = d.count;
      el.innerHTML = (document.documentElement.lang === 'en')
        ? `<b>${n}</b> visits`
        : `<b>${n}</b> vizite`;
      el.hidden = false;
    })
    .catch(() => {});
})();
</script>
